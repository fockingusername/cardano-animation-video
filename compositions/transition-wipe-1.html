<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <template id="transition-wipe-1-template">
    <div id="transition-wipe-1" data-composition-id="transition-wipe-1" data-width="1920" data-height="1080">

      <div id="wipe-panel" class="clip" data-start="0" data-duration="3.5" data-track-index="0"
           style="position:absolute; inset:0; width:1920px; height:1080px; background:#ceecff;
                  z-index:9999; opacity:0;
                  display:flex; align-items:center; justify-content:center;
                  padding:0 200px; box-sizing:border-box;">
        <div id="wipe-tekst">Ervaar om bestuurder in de WTP te zijn</div>
      </div>

      <style>
        #transition-wipe-1 { background: transparent; }
        #wipe-tekst {
          font-family: "Noto Sans", system-ui, sans-serif;
          font-weight: 700;
          font-size: 88px;
          line-height: 1.14;
          letter-spacing: 0.005em;
          text-align: center;
          color: #000f47;
          max-width: 1400px;
          opacity: 0;
        }
      </style>

      <script>
        window.__timelines = window.__timelines || {};
        const totaal = 3.5;

        const tl = gsap.timeline({ paused: true });

        // Fade in
        tl.fromTo("#wipe-panel", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 0);

        // Tekst zacht in
        tl.fromTo("#wipe-tekst",
          { opacity: 0, y: 16 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.4);
        // Tekst zacht uit
        tl.fromTo("#wipe-tekst",
          { opacity: 1, y: 0 },
          { opacity: 0, y: -10, duration: 0.4, ease: "power2.in" }, Math.max(1.0, totaal - 0.5));

        // Fade out
        tl.fromTo("#wipe-panel", { opacity: 1 }, { opacity: 0, duration: 0.5, ease: "power2.inOut" }, totaal - 0.5);

        tl.set({}, {}, totaal);

        window.__timelines["transition-wipe-1"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
