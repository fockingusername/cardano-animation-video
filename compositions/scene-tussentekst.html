<html data-composition-variables='[
  {"id":"tekst","type":"string","label":"De te tonen zin","default":"Doorleef verschillende scenario's"},
  {"id":"duur","type":"number","label":"Totale duur in seconden","default":"2"}
]'>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <template id="scene-tussentekst-template">
    <div id="scene-tussentekst" data-composition-id="scene-tussentekst" data-width="1920" data-height="1080">

      <div id="tt-stage" class="clip" data-start="0" data-track-index="0"
           style="position:absolute; inset:0; width:1920px; height:1080px;
                  display:flex; align-items:center; justify-content:center;
                  padding:0 220px; box-sizing:border-box;">
        <h2 id="tt-tekst"></h2>
      </div>

      <style>
        #scene-tussentekst { background: #3fd6a0; }
        #tt-tekst {
          margin: 0;
          font-family: "Noto Sans", system-ui, sans-serif;
          font-weight: 700;
          font-size: 88px;
          line-height: 1.14;
          letter-spacing: 0.005em;
          text-align: center;
          color: #000f47;
          max-width: 1400px;
          opacity: 0;
        }
      </style>

      <script>
        window.__timelines = window.__timelines || {};
        const { tekst, duur } = __hyperframes.getVariables();
        const totaal = Number(duur) || 2;

        document.querySelector("#tt-stage").setAttribute("data-duration", totaal);
        document.querySelector("#tt-tekst").textContent = tekst;

        const tl = gsap.timeline({ paused: true });

        // Zin fade-in van onder — rustig, ruim leesbaar
        tl.fromTo("#tt-tekst",
          { opacity: 0, y: 28 },
          { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 0.15);

        // Ruime standtijd, dan zachte fade-out
        tl.to("#tt-tekst",
          { opacity: 0, duration: 0.5, ease: "power2.in" }, Math.max(1.0, totaal - 0.5));

        tl.set({}, {}, totaal);

        window.__timelines["scene-tussentekst"] = tl;
      </script>
    </div>
  </template>
</body>
</html>
