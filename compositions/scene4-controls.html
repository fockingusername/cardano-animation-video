<template id="scene4-controls-template">
  <div id="scene4-controls" data-composition-id="scene4-controls" data-width="1920" data-height="1080">

    <div id="sc4-stage" class="clip"
         data-start="0" data-duration="14.5" data-track-index="0"
         style="position:absolute; inset:0; width:1920px; height:1080px;
                display:flex; align-items:center; justify-content:center;">

      <div id="sc4-tablet-frame">
        <div id="sc4-tablet-camera"></div>
        <div id="sc4-panel-window">
          <!-- Scrollend gedeelte -->
          <img id="sc4-panel-img" src="../assets/figma-controls-panel-nl.svg" alt="PensionSim beleidspaneel" />
          <!-- Masker rechterkolom: verhindert dat scrollende SVG-rechterkolom zichtbaar is -->
          <div id="sc4-right-mask"></div>
          <!-- Sticky nav overlay: SVG y=0–57 → display y=0–54px -->
          <div id="sc4-sticky-nav">
            <img src="../assets/figma-controls-panel-nl.svg" alt="" aria-hidden="true" />
          </div>
          <!-- Sticky Wijzigingen rechterkolom: SVG x=910–1416, y=81–655 (incl. blauwe UITVOEREN-knop) -->
          <div id="sc4-sticky-wijz">
            <img src="../assets/figma-controls-panel-nl.svg" alt="" aria-hidden="true" />
          </div>
          <!-- Inner shadow overlay op de UITVOEREN-knop bij klik -->
          <div id="sc4-uitvoeren-btn"></div>
          <!-- Click-burst streepjes links en rechts van de knop (gevuld via JS) -->
          <div id="sc4-burst-left"></div>
          <div id="sc4-burst-right"></div>
          <!-- Muiscursor -->
          <img id="sc4-cursor" src="../assets/cursor.svg" alt="" aria-hidden="true" />
        </div>
        <div id="sc4-tablet-home"></div>
      </div>

      <!-- Caption op stage-niveau (buiten tablet), identiek aan scene 2 -->
      <div id="sc4-caption">Stel zelf je beleid samen</div>

    </div>

    <style>
      #scene4-controls { background: #ceecff; overflow: hidden; }

      /* Groter tablet voor leesbaarheid: 1400×900 (was 1160×800) */
      #sc4-tablet-frame {
        position: relative;
        width: 1400px;
        height: 900px;
        background: #e0e0e0;
        border-radius: 20px;
        padding: 22px;
        box-sizing: border-box;
        box-shadow: 0 20px 60px rgba(0,0,0,0.20), 0 6px 20px rgba(0,0,0,0.12);
        z-index: 1;
        opacity: 0;
      }
      #sc4-tablet-camera {
        position: absolute; top: 5px; left: 50%; margin-left: -4px;
        width: 8px; height: 8px; border-radius: 50%; background: #aaa; z-index: 2;
      }
      #sc4-tablet-home {
        position: absolute; bottom: 5px; left: 50%; margin-left: -40px;
        width: 80px; height: 4px; border-radius: 2px; background: #aaa;
      }
      /* Window: 1400 - 2×22 = 1356px breed, 900 - 2×22 = 856px hoog */
      #sc4-panel-window {
        position: relative; width: 1356px; height: 856px;
        border-radius: 8px; overflow: hidden;
        background: #F2F4F8;
      }
      /* SVG 1440px breed → geschaald naar 1356px → hoogte: 2629 × (1356/1440) ≈ 2475px */
      /* clip-path verbergt rechterkolom (x=848–1356); 9px overlap dekt slider-track-eindpunten (SVG x=916→863px display) */
      #sc4-panel-img {
        position: absolute; top: 0; left: 0; width: 1356px; height: auto;
        clip-path: inset(0 508px 0 0);
      }

      /* Masker rechterkolom: uitgebreid tot left=848px om slider-tracks volledig te bedekken */
      #sc4-right-mask {
        position: absolute; top: 0; left: 848px;
        width: 508px; height: 100%;
        background: #F2F4F8;
        z-index: 2; pointer-events: none;
      }

      /* Sticky nav: knipt SVG in op eerste 54px (= 57px SVG × 0.9417 schaal) */
      #sc4-sticky-nav {
        position: absolute; top: 0; left: 0;
        width: 1356px; height: 54px;
        overflow: hidden; z-index: 3; pointer-events: none;
      }
      #sc4-sticky-nav img {
        position: absolute; top: 0; left: 0; width: 1356px; height: auto;
      }

      /*
        Sticky Wijzigingen: SVG x=910, y=81 t/m y=655 (incl. blauwe UITVOEREN-knop)
        Schaal 0.9417: left=857px, top=76px, w=477px, h=541px
        img offset: left=-857px, top=-76px
      */
      #sc4-sticky-wijz {
        position: absolute; top: 76px; left: 857px;
        width: 477px; height: 541px;
        overflow: hidden; z-index: 3; pointer-events: none;
      }
      #sc4-sticky-wijz img {
        position: absolute; top: -76px; left: -857px; width: 1356px; height: auto;
      }

      /* UITVOEREN-knop inner shadow overlay (drukt visueel in bij klik) */
      /* SVG-knop: x=910 y=591 w=506 h=64 → ×0.94167 schaal */
      #sc4-uitvoeren-btn {
        position: absolute;
        top: 556px; left: 857px;
        width: 477px; height: 60px;
        border-radius: 2px;
        pointer-events: none;
        opacity: 0;
        z-index: 4;
        transform-origin: center center;
        box-shadow: inset 0 4px 12px rgba(0,0,0,0.45), inset 0 2px 5px rgba(0,0,0,0.30);
      }

      /* Click-burst — streepjes aan linker- en rechterzijde van de knop */
      /* Knop: left=857 width=477 → right edge=1334, center-y=586 */
      #sc4-burst-left, #sc4-burst-right {
        position: absolute;
        width: 0; height: 0;
        top: 586px;
        z-index: 6; pointer-events: none;
      }
      #sc4-burst-left  { left: 857px; }
      #sc4-burst-right { left: 1334px; }
      #sc4-burst-left .ray,
      #sc4-burst-right .ray {
        position: absolute; left: 0; top: 0;
        transform-origin: 0 0;
      }
      #sc4-burst-left .ray i,
      #sc4-burst-right .ray i {
        position: absolute; left: -2px; top: 0;
        display: block;
        width: 3px; height: 14px;
        border-radius: 2px;
        background: #134DD6;
        opacity: 0;
      }

      /* Caption */
      #sc4-caption {
        position: absolute;
        top: 895px; left: 0;
        background: #000f47;
        color: #ffffff;
        font-family: "Noto Sans", system-ui, sans-serif;
        font-weight: 400;
        font-size: 52px;
        line-height: 1.14;
        letter-spacing: 0.005em;
        padding: 22px 48px;
        white-space: nowrap;
        opacity: 0;
        z-index: 5;
      }

      /* Cursor */
      #sc4-cursor {
        position: absolute; top: 0; left: 0;
        width: 28px; height: auto;
        z-index: 5; pointer-events: none; opacity: 0;
      }
    </style>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Tablet rustig in beeld (power2.out, ~0.8s)
      tl.fromTo("#sc4-tablet-frame",
        { opacity: 0, scale: 0.94, y: 28 },
        { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "power2.out" }, 0);

      // Sectie 1 — bovenkant paneel leesbaar (0.8–3.0s stilstand)

      // Caption schuift in vanuit links zodra het scrollen begint
      tl.fromTo("#sc4-caption",
        { opacity: 1, x: -1920 },
        { x: 0, duration: 0.8, ease: "power2.out" }, 1.5);

      // Sectie 2 — scroll naar sliders (1.5–4.0s)
      tl.to("#sc4-panel-img", { y: -500, duration: 2.5, ease: "sine.inOut" }, 1.5);
      // Stilstand sliders (5.5–7.5s)

      // Sectie 3 — scroll naar "Overrendementsratio per cohort" (6.0–8.0s)
      tl.to("#sc4-panel-img", { y: -1140, duration: 2.0, ease: "sine.inOut" }, 6.0);
      // Stilstand overrendementsratio (8.0–9.5s)

      // Sectie 4 — scroll naar "Beschermingsrendement per cohort" (9.5–11.0s)
      tl.to("#sc4-panel-img", { y: -1500, duration: 1.5, ease: "sine.inOut" }, 9.5);
      // Stilstand beschermingsrendement (11.0–11.3s)

      // ── Cursor: verschijnt na laatste scroll (t=11.2) ──
      tl.set("#sc4-cursor", { x: 1060, y: 640 }, 0);
      tl.to("#sc4-cursor", { opacity: 1, duration: 0.5, ease: "power2.out" }, 11.2);
      // Cursor beweegt naar de knop
      tl.to("#sc4-cursor", { y: 575, duration: 0.5, ease: "power2.inOut" }, 11.7);

      // ── Klik op UITVOEREN (t=12.3) ──
      // Indrukken: cursor zakt licht in én de knop wordt zichtbaar ingedrukt
      tl.to("#sc4-cursor",       { y: 582,                 duration: 0.10, ease: "power2.in" }, 12.30);
      tl.to("#sc4-uitvoeren-btn",{ opacity: 1, scale: 0.97, duration: 0.10, ease: "power2.in" }, 12.30);

      // Kort ingedrukt houden, dan loslaten: knop veert terug, schaduw verdwijnt
      tl.to("#sc4-cursor",       { y: 575,        duration: 0.22, ease: "back.out(2.2)" }, 12.48);
      tl.to("#sc4-uitvoeren-btn",{ scale: 1,      duration: 0.22, ease: "back.out(2.2)" }, 12.48);
      tl.to("#sc4-uitvoeren-btn",{ opacity: 0,    duration: 0.28, ease: "power2.out"   }, 12.56);

      // Click-burst: waaier van streepjes aan linker- en rechterkant van de knop
      // Verschijnt nadat de knop terug is geveerd (t=12.70)
      const BURST_T = 12.70;
      const RAYS = 3;
      [
        { el: "#sc4-burst-left",  angleFrom:  45, angleTo:  135 }, // waaiert naar links
        { el: "#sc4-burst-right", angleFrom: -135, angleTo: -45 }, // waaiert naar rechts
      ].forEach(({ el, angleFrom, angleTo }) => {
        const container = document.querySelector(el);
        for (let i = 0; i < RAYS; i++) {
          const ray = document.createElement("span");
          ray.className = "ray";
          const line = document.createElement("i");
          ray.appendChild(line);
          container.appendChild(ray);
          const angle = angleFrom + (i / (RAYS - 1)) * (angleTo - angleFrom);
          gsap.set(ray, { rotation: angle });
          tl.fromTo(line,
            { y: 6, opacity: 0, scaleY: 0.4 },
            { y: 28, opacity: 1, scaleY: 1, duration: 0.18, ease: "power3.out" }, BURST_T + i * 0.015);
          tl.to(line,
            { y: 50, opacity: 0, scaleY: 0.6, duration: 0.30, ease: "power2.in" }, BURST_T + 0.18 + i * 0.015);
        }
      });

      // Cursor verdwijnt rustig na klik
      tl.to("#sc4-cursor", { opacity: 0, duration: 0.4, ease: "power2.in" }, 12.8);

      // ── Cinematische zoom-in + achtergrond fade naar donkerblauw ──
      tl.to("#sc4-stage",        { scale: 1.18, opacity: 0,  duration: 1.0, ease: "power2.in" }, 13.0);
      tl.to("#scene4-controls",  { backgroundColor: "#000f47", duration: 1.0, ease: "power2.in" }, 13.0);

      tl.set({}, {}, 14.5);

      window.__timelines["scene4-controls"] = tl;
    </script>
  </div>
</template>
