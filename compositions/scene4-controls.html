<template id="scene4-controls-template">
  <div id="scene4-controls" data-composition-id="scene4-controls" data-width="1920" data-height="1080">

    <div id="sc4-stage" class="clip"
         data-start="0" data-duration="17" data-track-index="0"
         style="position:absolute; inset:0; width:1920px; height:1080px;
                display:flex; align-items:center; justify-content:center;">

      <div id="sc4-tablet-frame">
        <div id="sc4-tablet-camera"></div>
        <div id="sc4-panel-window">
          <!-- Scrollend gedeelte -->
          <img id="sc4-panel-img" src="../assets/figma-controls-panel-nl.svg" alt="PensionSim beleidspaneel" />
          <!-- Masker rechterkolom: verhindert dat scrollende SVG-rechterkolom zichtbaar is -->
          <div id="sc4-right-mask"></div>
          <!-- Sticky nav overlay: SVG y=0–57 → display y=0–54px -->
          <div id="sc4-sticky-nav">
            <img src="../assets/figma-controls-panel-nl.svg" alt="" aria-hidden="true" />
          </div>
          <!-- Sticky Wijzigingen rechterkolom: SVG x=910–1416, y=81–655 (incl. blauwe UITVOEREN-knop) -->
          <div id="sc4-sticky-wijz">
            <img src="../assets/figma-controls-panel-nl.svg" alt="" aria-hidden="true" />
          </div>
          <!-- UITVOEREN-knop overlay: pulseer bij klik van de cursor -->
          <div id="sc4-uitvoeren-btn"></div>
          <!-- Muiscursor -->
          <img id="sc4-cursor" src="../assets/cursor.svg" alt="" aria-hidden="true" />
        </div>
        <div id="sc4-tablet-home"></div>
      </div>

      <!-- Caption op stage-niveau (buiten tablet), identiek aan scene 2 -->
      <div id="sc4-caption">Stel zelf je beleid samen</div>
    </div>

    <style>
      #scene4-controls { background: #ceecff; overflow: hidden; }

      /* Groter tablet voor leesbaarheid: 1400×900 (was 1160×800) */
      #sc4-tablet-frame {
        position: relative;
        width: 1400px;
        height: 900px;
        background: #e0e0e0;
        border-radius: 20px;
        padding: 22px;
        box-sizing: border-box;
        box-shadow: 0 20px 60px rgba(0,0,0,0.20), 0 6px 20px rgba(0,0,0,0.12);
        z-index: 1;
        opacity: 0;
      }
      #sc4-tablet-camera {
        position: absolute; top: 5px; left: 50%; margin-left: -4px;
        width: 8px; height: 8px; border-radius: 50%; background: #aaa; z-index: 2;
      }
      #sc4-tablet-home {
        position: absolute; bottom: 5px; left: 50%; margin-left: -40px;
        width: 80px; height: 4px; border-radius: 2px; background: #aaa;
      }
      /* Window: 1400 - 2×22 = 1356px breed, 900 - 2×22 = 856px hoog */
      #sc4-panel-window {
        position: relative; width: 1356px; height: 856px;
        border-radius: 8px; overflow: hidden;
        background: #F2F4F8;
      }
      /* SVG 1440px breed → geschaald naar 1356px → hoogte: 2629 × (1356/1440) ≈ 2475px */
      /* clip-path verbergt rechterkolom (x=848–1356); 9px overlap dekt slider-track-eindpunten (SVG x=916→863px display) */
      #sc4-panel-img {
        position: absolute; top: 0; left: 0; width: 1356px; height: auto;
        clip-path: inset(0 508px 0 0);
      }

      /* Masker rechterkolom: uitgebreid tot left=848px om slider-tracks volledig te bedekken */
      #sc4-right-mask {
        position: absolute; top: 0; left: 848px;
        width: 508px; height: 100%;
        background: #F2F4F8;
        z-index: 2; pointer-events: none;
      }

      /* Sticky nav: knipt SVG in op eerste 54px (= 57px SVG × 0.9417 schaal) */
      #sc4-sticky-nav {
        position: absolute; top: 0; left: 0;
        width: 1356px; height: 54px;
        overflow: hidden; z-index: 3; pointer-events: none;
      }
      #sc4-sticky-nav img {
        position: absolute; top: 0; left: 0; width: 1356px; height: auto;
      }

      /*
        Sticky Wijzigingen: SVG x=910, y=81 t/m y=655 (incl. blauwe UITVOEREN-knop)
        Schaal 0.9417: left=857px, top=76px, w=477px, h=541px
        img offset: left=-857px, top=-76px
      */
      #sc4-sticky-wijz {
        position: absolute; top: 76px; left: 857px;
        width: 477px; height: 541px;
        overflow: hidden; z-index: 3; pointer-events: none;
      }
      #sc4-sticky-wijz img {
        position: absolute; top: -76px; left: -857px; width: 1356px; height: auto;
      }

      /* UITVOEREN-knop overlay — liegt precies over de knop, matcht de kleur */
      #sc4-uitvoeren-btn {
        position: absolute;
        top: 545px; left: 860px;
        width: 466px; height: 62px;
        background: #1566d4;
        border-radius: 4px;
        pointer-events: none; opacity: 0; z-index: 4;
        transform-origin: center center;
      }

      /* Caption */
      #sc4-caption {
        position: absolute;
        top: 895px; left: 0;
        background: #000f47;
        color: #ffffff;
        font-family: "Noto Sans", system-ui, sans-serif;
        font-weight: 700;
        font-size: 52px;
        letter-spacing: 0.01em;
        padding: 22px 48px;
        white-space: nowrap;
        opacity: 0;
        z-index: 5;
      }

      /* Cursor */
      #sc4-cursor {
        position: absolute; top: 0; left: 0;
        width: 28px; height: auto;
        z-index: 5; pointer-events: none; opacity: 0;
      }
    </style>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Tablet rustig in beeld (power2.out, ~0.8s)
      tl.fromTo("#sc4-tablet-frame",
        { opacity: 0, scale: 0.94, y: 28 },
        { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "power2.out" }, 0);

      // Sectie 1 — bovenkant paneel leesbaar (0.8–3.0s stilstand)

      // Caption schuift in vanuit links zodra het scrollen begint
      tl.fromTo("#sc4-caption",
        { opacity: 1, x: -1920 },
        { x: 0, duration: 0.8, ease: "power2.out" }, 3.0);

      // Sectie 2 — scroll naar sliders (3.0–5.5s)
      tl.to("#sc4-panel-img", { y: -500, duration: 2.5, ease: "sine.inOut" }, 3.0);
      // Stilstand sliders (5.5–7.5s)

      // Sectie 3 — scroll naar "Overrendementsratio per cohort" (7.5–9.5s)
      // Sectie start op display y=1289px; toon ~150px van boven → scroll=1139≈1140px
      tl.to("#sc4-panel-img", { y: -1140, duration: 2.0, ease: "sine.inOut" }, 7.5);
      // Stilstand overrendementsratio (9.5–11.0s)

      // Sectie 4 — scroll naar "Beschermingsrendement per cohort" (11.0–12.5s)
      // Sectie start op display y=1796px; toon ~300px van boven → scroll=1496≈1500px
      tl.to("#sc4-panel-img", { y: -1500, duration: 1.5, ease: "sine.inOut" }, 11.0);
      // Stilstand beschermingsrendement (12.5–12.8s)

      // ── Cursor: verschijnt na laatste scroll (t=12.7) ──
      tl.set("#sc4-cursor", { x: 1060, y: 640 }, 0);
      tl.to("#sc4-cursor", { opacity: 1, duration: 0.5, ease: "power2.out" }, 12.7);
      // Cursor beweegt naar de knop
      tl.to("#sc4-cursor", { y: 575, duration: 0.5, ease: "power2.inOut" }, 13.2);

      // ── Klik op UITVOEREN (t=13.7) ──
      // Cursor drukt in
      tl.to("#sc4-cursor", { scale: 0.80, duration: 0.08, ease: "power2.in"  }, 13.72);
      tl.to("#sc4-cursor", { scale: 1,    duration: 0.12, ease: "power2.out" }, 13.80);

      // Knop verschijnt iets voor de klik
      tl.to("#sc4-uitvoeren-btn", { opacity: 1, duration: 0.05 }, 13.65);
      // Indrukken: schaal omlaag + verduister
      tl.to("#sc4-uitvoeren-btn", { scale: 0.96, filter: "brightness(0.70)", duration: 0.08, ease: "power2.in"    }, 13.72);
      // Loslaten: veer terug met kleine overshoot + oplichting
      tl.to("#sc4-uitvoeren-btn", { scale: 1.02, filter: "brightness(1.15)", duration: 0.12, ease: "power2.out"   }, 13.80);
      // Settelen
      tl.to("#sc4-uitvoeren-btn", { scale: 1,    filter: "brightness(1)",    duration: 0.10, ease: "power2.inOut" }, 13.92);
      // Fade out
      tl.to("#sc4-uitvoeren-btn", { opacity: 0, duration: 0.35, ease: "power2.in" }, 14.15);

      // Cursor verdwijnt rustig na klik
      tl.to("#sc4-cursor", { opacity: 0, duration: 0.4, ease: "power2.in" }, 14.5);

      // ── Cinematische zoom-out — pas na rustmoment na de klik ──
      tl.to("#sc4-stage", { scale: 0.82, opacity: 0, duration: 1.0, ease: "power2.in" }, 15.5);

      tl.set({}, {}, 17);

      window.__timelines["scene4-controls"] = tl;
    </script>
  </div>
</template>
