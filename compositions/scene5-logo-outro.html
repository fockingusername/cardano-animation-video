        });
      }

      // Shimmer ends at 4.0s — glyphs start after
      swap(5.2, -S, S);
      swap(6.9,  0, 0);

      // Split sentence into word spans for captions animation
      const sentenceEl = document.getElementById("cta-sentence");
      const rawWords = sentenceEl.textContent.trim().split(" ");
      sentenceEl.textContent = "";
      const words = rawWords.map(function(w) {
        const s = document.createElement("span");
        s.textContent = w;
        sentenceEl.appendChild(s);
        return s;
      });

      // Words pop in one by one, caption style
      tl.from(words, {
        opacity: 0, y: 18, duration: 0.4, ease: "power2.out",
        stagger: 0.18
      }, 0.4);

      // URL box reveals left-to-right via clip-path, then single slow shimmer
      gsap.set("#cta-url-wrap", { clipPath: "inset(0 100% 0 0)" });
      tl.to("#cta-url-wrap", { clipPath: "inset(0 0% 0 0)", duration: 0.9, ease: "power2.inOut" }, 1.6);

      // Shimmer once, slowly, after reveal is done (1.6 + 0.9 = 2.5s)
      tl.to("#cta-shimmer", { translateX: "280%", duration: 2.2, ease: "sine.inOut" }, 2.6);

      // Powered-by: subtiele ingang na volledig laden, laag max opacity (ontwikkelpartner, niet op de voorgrond)
      tl.fromTo("#powered-by", { opacity: 0 }, { opacity: 0.5, duration: 1.5, ease: "sine.out" }, 3.5);

      // URL holds for 3s (1.3 → 4.3), then 3 more seconds
      tl.set({}, {}, 8);

      window.__timelines["scene5-logo-outro"] = tl;
    </script>
  </div>
</template>
